    <div style="background-color: rgb(253, 156, 234); text-align: center;">
        <h2 style="color: rgb(226, 22, 185)">MẸ!</h2>

    <div style="background-color: rgb(245, 245, 154); text-align: center;">

        <p style="color: blue;">
            Mẹ là cả 1 trời thương<br>
            Mẹ là cả một thiên đường trần gian<br>
            Công ơn cha mẹ tựa biển trời
        </p>

        <p style="color: red;">
            Làm sao báo hiếu hỡi người ơi?<br>
            Nếu chưa báo hiếu đừng bất hiếu<br>
            Bất hiếu làm ta khổ muôn đời
        </p>

        <p style="color: green;">
            Một đời vốn liếng mẹ trao<br>
            Mẹ cho tất cả mẹ nào giữ riêng<br>
            Mẹ hiền như 1 bà tiên<br>
            Mẹ theo con suốt hành trình con đi
        </p>

    </div>
